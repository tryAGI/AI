name: Publish
on:
  push:
    branches:
      - main
    tags:
      - v**
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    uses: tryAGI/workflows/.github/workflows/dotnet-sdk-build-test-publish.yml@main
    with:
      dotnet-version: 10.0.x
      additional-test-arguments: '--logger GitHubActions'
    secrets:
      nuget-key: ${{ secrets.NUGET_API_KEY || secrets.NUGET_KEY }}
